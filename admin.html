<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Administration Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4f46e5; 
            --primary-hover: #4338ca;
            --bg-body: #0f0f12; 
            --bg-card: #17171c; 
            --text-main: #f5f6fa;
            --text-muted: #a4b0be;
            --border: #2d2d37;
            --error: #ff7675; 
            --success: #2ecc71;
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.6;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 800px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* --- AUTHENTICATION GATE --- */
        #authGate {
            text-align: center;
            padding: 2rem 1rem;
        }

        .lock-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .pin-input {
            width: 100%;
            max-width: 260px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-body);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.2em;
            outline: none;
            margin-bottom: 1rem;
        }

        .pin-input:focus {
            border-color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        /* --- MAIN CONSOLE PANEL --- */
        #consolePanel {
            display: none;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            color: var(--error);
            border-color: var(--error);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.03em;
        }

        input[type="text"], textarea, input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-body);
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: var(--primary);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* --- LIVE MONITOR LIST --- */
        .monitor-pane {
            border-left: 1px solid var(--border);
            padding-left: 2rem;
            max-height: 500px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .monitor-pane { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 2rem; }
        }

        .pane-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .book-item {
            background: var(--bg-body);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .book-info h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .book-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .del-btn {
            background: none;
            border: none;
            color: var(--error);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 5px;
        }

        .del-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div id="authGate">
            <a href="dashboard.html" class="control-btn" style="text-decoration: none;">Admin Dashboard</a><br>
            <span class="lock-icon">🔒</span>
            <h2>Administrative Authorization Required</h2>
            <p class="subtitle">Enter validation credentials to unlock terminal controls</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="••••••••" maxlength="8"><br>
            <button class="btn" id="loginBtn">Verify Access Token</button>
        </div>

        <div id="consolePanel">
            <div class="panel-header">
                <div>
                    <h2>Central Admin Archive Dashboard</h2>
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Direct Live Connected Archive Node</p>
                </div>
                <button class="logout-btn" id="logoutBtn">Terminal Exit</button>
            </div>

            <div class="grid-layout">
                <div>
                    <h3 class="pane-title">Upload Archive Resource</h3>
                    <form id="adminUploadForm">
                        <div class="form-group">
                            <label for="bookTitle">Document Title</label>
                            <input type="text" id="bookTitle" required placeholder="e.g., A man of the people">
                        </div>
                        <div class="form-group">
                            <label for="bookAuthor">Author</label>
                            <input type="text" id="bookAuthor" required placeholder="e.g., Chinua Achebe">
                        </div>
                        <div class="form-group">
                            <label for="bookGenre">Genre</label>
                            <input type="text" id="bookGenre" required placeholder="e.g., Novel">
                        </div>
                        <div class="form-group">
                            <label for="bookFile">Attach Document (.pdf, .txt)</label>
                            <input type="file" id="bookFile" accept=".pdf,.txt" required>
                        </div>
                        <div class="form-group">
                            <label for="bookDetails">Description Summary</label>
                            <textarea id="bookDetails" required placeholder="Provide a short summary..."></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Publish Document</button>
                    </form>
                </div>

                <div class="monitor-pane">
                    <h3 class="pane-title">Currently Stored Documents</h3>
                    <div id="adminLiveList"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const ADMIN_PIN = "8481"; // Setup default admin pin
        let dbInstance = null;

        const authGate = document.getElementById('authGate');
        const consolePanel = document.getElementById('consolePanel');
        const pinInput = document.getElementById('pinInput');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        
        const adminUploadForm = document.getElementById('adminUploadForm');
        const adminLiveList = document.getElementById('adminLiveList');

        // Access Authorization Pipeline
        loginBtn.addEventListener('click', () => {
            if(pinInput.value === ADMIN_PIN) {
                authGate.style.display = 'none';
                consolePanel.style.display = 'block';
                initializeConsoleStore();
            } else {
                alert("Authorization Denied: Invalid Security Identifier Sequence.");
                pinInput.value = '';
            }
        });

        pinInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') loginBtn.click();
        });

        logoutBtn.addEventListener('click', () => {
            consolePanel.style.display = 'none';
            authGate.style.display = 'block';
            pinInput.value = '';
        });

        // Setup Shared Memory Pipeline Connection Core
        function initializeConsoleStore() {
            const request = indexedDB.open("ChatPkLibraryDB", 1);
            
            request.onupgradeneeded = function(event) {
                const db = event.target.result;
                if (!db.objectStoreNames.contains("books")) {
                    db.createObjectStore("books", { keyPath: "id" });
                }
            };

            request.onsuccess = function(event) {
                dbInstance = event.target.result;
                refreshLiveMonitorList();
            };

            request.onerror = function() {
                alert("Fatal Error: Could not bind to target application layer storage array.");
            };
        }

        function refreshLiveMonitorList() {
            const transaction = dbInstance.transaction(["books"], "readonly");
            const store = transaction.objectStore("books");
            const request = store.getAll();

            request.onsuccess = function() {
                const items = request.result || [];
                adminLiveList.innerHTML = '';

                if(items.length === 0) {
                    adminLiveList.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem;">No manual entries recorded inside workspace storage matrix.</p>`;
                    return;
                }

                items.forEach(book => {
                    const row = document.createElement('div');
                    row.className = 'book-item';
                    row.innerHTML = `
                        <div class="book-info">
                            <h4>${book.title}</h4>
                            <p>${book.author} | <span style="color: var(--primary);">${book.genre}</span></p>
                        </div>
                        <button class="del-btn" onclick="eraseRecordItem('${book.id}')">&times;</button>
                    `;
                    adminLiveList.appendChild(row);
                });
            };
        }

        // Action Command Execution: Write Resource Object
        adminUploadForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const fileInput = document.getElementById('bookFile');
            const file = fileInput.files[0];

            if (file) {
                const newBookObj = {
                    id: `uploaded_${Date.now()}`,
                    title: document.getElementById('bookTitle').value,
                    author: document.getElementById('bookAuthor').value,
                    genre: document.getElementById('bookGenre').value,
                    details: document.getElementById('bookDetails').value,
                    fileBlob: file, 
                    isDefault: false
                };

                const transaction = dbInstance.transaction(["books"], "readwrite");
                const store = transaction.objectStore("books");
                const saveOperation = store.put(newBookObj);

                saveOperation.onsuccess = () => {
                    adminUploadForm.reset();
                    refreshLiveMonitorList();
                    alert("Resource structure injected into cross-system platform cluster successfully.");
                };
            }
        });

        //Delete Resource Object
        window.eraseRecordItem = function(bookId) {
            if(confirm("Confirm structural purge? This deletes the object record across all client sessions instantly.")) {
                const transaction = dbInstance.transaction(["books"], "readwrite");
                const store = transaction.objectStore("books");
                const removeOperation = store.delete(bookId);

                removeOperation.onsuccess = () => {
                    refreshLiveMonitorList();
                };
            }
        }
    </script>
</body>
</html>
